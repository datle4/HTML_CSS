<!DOCTYPE html>
<html>
  <head>
    <title>Picture Pracice</title>
    <style>
      .picture-settings1 {
        width: 200px;
        border-radius: 10px;
        margin-right: 80px;
      }
      .picture-settings2 {
        width: 140px;
        height: 140px;
        object-fit: cover;
        object-position: center;
        margin-right: 80px;
      }
      .picture-settings3 {
        width: 140px;
        height: 140px;
        border-radius: 100px;
        object-fit: cover;
        object-position: center;
      }
      .search-box {
        font-size: 16px;
        border-width: 1px;
        border-style: solid;
        border-color: rgb(200, 200, 200);
        padding-top: 12px;
        padding-bottom: 12px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 8px;
        margin-right: 120px;
      }
      .search-google {
        font-size: 16px;
        width: 500px;
        padding-top: 12px;
        padding-bottom: 12px;
        padding-left: 15px;
        padding-right: 15px;
        border: none;
        border-radius: 30px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <img class="picture-settings1" src="thumbnail.jpg">
    <img class="picture-settings2" src="thumbnail.jpg">
    <img class="picture-settings3" src="thumbnail.jpg">

    <br><br><br><br><br>

    <input class="search-box" type="text" placeholder="search">
    <input class="search-google" type="text" placeholder="Search Google or type URL">
  </body>
</html>
